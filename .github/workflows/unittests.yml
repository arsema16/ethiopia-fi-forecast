name: CI - Code Quality and Tests

on:
  push:
    branches: [ main, develop, task-* ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Code Quality and Linting
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check --diff .
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .
    
    - name: Type checking with mypy
      run: |
        mypy --ignore-missing-imports .
      continue-on-error: true

  # Job 2: Unit Tests
  tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Job 3: Notebook Validation
  validate-notebooks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbconvert nbformat jupyter
    
    - name: Validate Jupyter notebooks
      run: |
        # Check for notebooks and validate them
        find notebooks -name "*.ipynb" -exec jupyter nbconvert --to notebook --execute --inplace {} \;
      continue-on-error: true

  # Job 4: Security Scanning
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install bandit safety
    
    - name: Security scan with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Check dependencies for vulnerabilities with safety
      run: |
        safety check
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json

  # Job 5: Dashboard Build Test
  dashboard-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install streamlit pandas numpy plotly
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Test dashboard import
      run: |
        python -c "import dashboard.app; print('Dashboard imports successfully')"
    
    - name: Validate dashboard
      run: |
        # Check if dashboard exists and has no syntax errors
        python -m py_compile dashboard/app.py

  # Job 6: Data Validation
  validate-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Validate dataset
      run: |
        python -c "
import pandas as pd
# Check if data files exist
try:
    df = pd.read_csv('data/raw/ethiopia_fi_unified_data.csv')
    print(f'✅ Dataset loaded: {len(df)} rows')
    print(f'✅ Columns: {df.columns.tolist()}')
    print(f'✅ Record types: {df[df.columns[0]].unique() if len(df.columns) > 0 else []}')
except Exception as e:
    print(f'❌ Error loading dataset: {e}')
    exit(1)
"
    
    - name: Validate processed data
      run: |
        python -c "
import pandas as pd
import os
# Check if processed data exists
files = ['refined_impact_matrix.csv', 'forecast_base_2025_2027.csv', 
         'forecast_optimistic_2025_2027.csv', 'forecast_pessimistic_2025_2027.csv']
for f in files:
    path = f'data/processed/{f}'
    if os.path.exists(path):
        df = pd.read_csv(path)
        print(f'✅ {f}: {len(df)} rows')
    else:
        print(f'⚠️ {f} not found')
"

  # Job 7: Documentation Check
  documentation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check README exists
      run: |
        test -f README.md && echo "✅ README.md exists" || echo "❌ README.md missing"
    
    - name: Check final report exists
      run: |
        test -f reports/final_report.md && echo "✅ final_report.md exists" || echo "❌ final_report.md missing"
    
    - name: Check data enrichment log
      run: |
        test -f reports/data_enrichment_log.md && echo "✅ data_enrichment_log.md exists" || echo "❌ data_enrichment_log.md missing"

  # Job 8: Dependency Check
  dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check requirements file
      run: |
        test -f requirements.txt && echo "✅ requirements.txt exists" || echo "❌ requirements.txt missing"
    
    - name: Check for outdated packages
      run: |
        if [ -f requirements.txt ]; then
          pip install pip-audit
          pip-audit -r requirements.txt || true
        fi

# Job 9: Performance Benchmark
  performance:
    runs-on: ubuntu-latest
    needs: [code-quality, tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy scikit-learn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Benchmark notebooks
      run: |
        python -c "
import time
import pandas as pd
import numpy as np
from sklearn.linear_model import LinearRegression

# Simple benchmark
start = time.time()
df = pd.read_csv('data/raw/ethiopia_fi_unified_data.csv')
df['observation_date'] = pd.to_datetime(df['observation_date'])
print(f'✅ Data load time: {time.time() - start:.2f} seconds')

# Check data size
print(f'✅ Data shape: {df.shape}')
print(f'✅ Memory usage: {df.memory_usage(deep=True).sum() / 1024 / 1024:.2f} MB'
) "

  # Job 10: Final Status
  final-status:
    runs-on: ubuntu-latest
    needs: [code-quality, tests, validate-notebooks, security, dashboard-build, validate-data, documentation, dependencies]
    if: always()
    
    steps:
    - name: Check all jobs status
      run: |
        echo "=== CI/CD Pipeline Status ==="
        echo "✅ Code Quality: ${{ needs.code-quality.result }}"
        echo "✅ Tests: ${{ needs.tests.result }}"
        echo "✅ Notebook Validation: ${{ needs.validate-notebooks.result }}"
        echo "✅ Security Scan: ${{ needs.security.result }}"
        echo "✅ Dashboard Build: ${{ needs.dashboard-build.result }}"
        echo "✅ Data Validation: ${{ needs.validate-data.result }}"
        echo "✅ Documentation: ${{ needs.documentation.result }}"
        echo "✅ Dependencies: ${{ needs.dependencies.result }}"
        
        if [ "${{ needs.code-quality.result }}" == "success" ] && \
           [ "${{ needs.tests.result }}" == "success" ] && \
           [ "${{ needs.validate-notebooks.result }}" == "success" ]; then
          echo "🎉 All critical checks passed!"
        else
          echo "⚠️ Some checks failed. Please review."
          exit 1
        fi
